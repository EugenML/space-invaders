<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPACE INVADERS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Game over / win overlay -->
    <div id="overlay" class="hidden">
      <h1 id="overlayTitle"></h1>
      <p id="overlayScore"></p>
      <button id="overlayBtn">PLAY AGAIN</button>
    </div>

    <!-- Auth modal -->
    <div id="authModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-tabs">
          <button class="tab-btn active" id="tabLogin">LOGIN</button>
          <button class="tab-btn" id="tabRegister">REGISTER</button>
        </div>
        <div id="authForm">
          <input id="authUsername" type="text" placeholder="Username" maxlength="50" autocomplete="username">
          <input id="authPassword" type="password" placeholder="Password" maxlength="100" autocomplete="current-password">
          <p id="authError" class="auth-error"></p>
          <button id="authSubmit">LOGIN</button>
          <button id="authClose" class="btn-ghost">PLAY WITHOUT LOGIN</button>
        </div>
      </div>
    </div>

    <!-- HUD bar above canvas -->
    <div id="userBar">
      <span id="userStatus">NOT LOGGED IN</span>
      <button id="authToggleBtn">LOGIN / REGISTER</button>
      <button id="logoutBtn" class="hidden">LOGOUT</button>
      <button id="leaderboardBtn">LEADERBOARD</button>
    </div>

    <!-- Leaderboard modal -->
    <div id="lbModal" class="modal hidden">
      <div class="modal-box">
        <h2>LEADERBOARD</h2>
        <table id="lbTable">
          <thead><tr><th>#</th><th>PLAYER</th><th>HIGH SCORE</th></tr></thead>
          <tbody id="lbBody"></tbody>
        </table>
        <button id="lbClose">CLOSE</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
  <script src="auth.js"></script>
</body>
</html>
